<div class="forgot-password-container">
    <div class="forgot-password-card">
        <div class="forgot-password-header">
            <h1>Recuperar Contraseña</h1>
            <p>Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
        </div>

        <div *ngIf="errorMessage()" class="alert alert-error">
            {{ errorMessage() }}
        </div>

        <div *ngIf="successMessage()" class="alert alert-success">
            {{ successMessage() }}
        </div>

        <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input id="email" type="email" formControlName="email" placeholder="coach@example.com"
                    [class.error]="email?.invalid && email?.touched" />
                <span *ngIf="email?.invalid && email?.touched" class="error-text">
                    <span *ngIf="email?.errors?.['required']">El correo es obligatorio</span>
                    <span *ngIf="email?.errors?.['email']">Por favor ingresa un correo válido</span>
                </span>
            </div>

            <app-button type="submit" variant="primary" [fullWidth]="true" [loading]="loading()"
                [disabled]="forgotPasswordForm.invalid || loading()">
                Enviar correo de recuperación
            </app-button>
        </form>

        <div class="login-link">
            <p><a routerLink="/login">Volver a iniciar sesión</a></p>
        </div>
    </div>
</div>
